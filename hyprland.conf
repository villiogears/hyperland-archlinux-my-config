# デフォルトキーボード設定（日本語/英語切り替え対応）
input {
	kb_layout = jp,us
	kb_variant = ,
	kb_options = grp:alt_shift_toggle
}

# Caps LockでIME切り替え（fcitx5前提）
# fcitx5の設定でCaps Lockをトリガーにする必要あり
# 例: fcitx5-configtoolでCaps Lockを切り替えキーに設定

# コンパクトなUI（WaybarとRofiの最小設定）
exec-once = waybar &
exec-once = rofi -show drun &

# Nord系でかっこよく
general {
	border_size = 3
	gaps_in = 6
	gaps_out = 12
	col.active_border = 0xff88c0d0
	col.inactive_border = 0xff3b4252
	col.background = 0xff2e3440
	col.text = 0xffd8dee9
	col.shadow = 0xff5e81ac
}
