# =====================
# デフォルト設定（公式推奨値）
# =====================
general {
	border_size = 1
	gaps_in = 5
	gaps_out = 10
	col.active_border = 0xffa3be8c
	col.inactive_border = 0xff4c566a
	col.background = 0xff2e3440
	col.text = 0xffeceff4
	col.shadow = 0xff000000
	rounding = 5
	shadow = yes
	shadow_range = 10
	shadow_offset = 2 2
}

animations {
	enabled = yes
	animation = windows, 1, 5, default, slide
	animation = fade, 1, 5, default, fade
	animation = border, 1, 5, default, slide
	animation = workspace, 1, 5, default, slide
}

input {
	kb_layout = us
	kb_variant = ,
	kb_options = grp:alt_shift_toggle
}

# ワークスペース切り替え（デフォルト）
bind = SUPER+Tab, workspace, next
bind = SUPER+Shift+Tab, workspace, prev

# =====================
# カスタム設定（競合しないように）
# =====================
# 日本語/英語切り替え対応
input {
	kb_layout = jp,us
	kb_variant = ,
	kb_options = grp:alt_shift_toggle
}

# Caps LockでIME切り替え（fcitx5前提）
# fcitx5の設定でCaps Lockをトリガーにする必要あり
# 例: fcitx5-configtoolでCaps Lockを切り替えキーに設定

# コンパクトなUI（WaybarとRofiの最小設定）
exec-once = waybar &
# カスタムHyprlauncher（NordテーマのRofi）
exec = rofi -show drun -theme ~/Documents/hyperland-archlinux-my-config/rofi/nord.rasi &
# サウンドビジュアライザー（cava）を専用ワークスペースで起動
exec-once = cava &
# カスタムHyprlauncher（NordテーマのRofi）
exec = rofi -show drun -theme ./rofi/nord.rasi


# Nord系でかっこよく（カスタム）
general {
	border_size = 3
	gaps_in = 6
	gaps_out = 12
	col.active_border = 0xff88c0d0
	col.inactive_border = 0xff3b4252
	col.background = 0xff2e3440
	col.text = 0xffd8dee9
	col.shadow = 0xff5e81ac
	rounding = 12
	shadow = yes
	shadow_range = 16
	shadow_offset = 4 4
}

# アニメーション（カスタム）
animations {
	enabled = yes
	animation = windows, 1, 7, default, slide
	animation = fade, 1, 7, default, fade
	animation = border, 1, 7, default, slide
	animation = workspace, 1, 7, default, slide
}

# ワークスペース切り替えホットキー（カスタム）
bind = SUPER+1, workspace, 1
bind = SUPER+2, workspace, 2
bind = SUPER+3, workspace, 3
bind = SUPER+4, workspace, 4
bind = SUPER+5, workspace, 5
bind = SUPER+6, workspace, 6
bind = SUPER+7, workspace, 7
bind = SUPER+8, workspace, 8
bind = SUPER+9, workspace, 9
bind = SUPER+0, workspace, 10